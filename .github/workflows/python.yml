name: ci

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: python

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check .
      - run: |
          for t in tests/test_*.py; do
            echo "== $t"
            python3 "$t"
          done
