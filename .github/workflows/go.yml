name: go

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: go

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: test -z "$(gofmt -l .)"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
